<!DOCTYPE html>
<html>
<head>
    <title>To Do App</title>

    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        .todo-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1b1b1b;
            padding: 30px;
            border-radius: 16px;
        }

        h1 {
            color: orange;
            text-align: center;
        }

        input {
            width: 70%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: orange;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        ul {
            margin-top: 20px;
            padding-left: 20px;
        }

        li {
            margin-bottom: 10px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        li button {
            background-color: red;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        #btnStergeTot {
            margin-top: 10px;
        }
    
    </style>
</head> 
<body>
    <div class="todo-container">
        <h1>To Do App</h1>

        <input type="text" id="taskInput" placeholder="Scrie un task" onkeydown="apasareEnter(event)"> 
        <button onclick="adaugaTask()">Adauga</button>

        <ul id="taskList"></ul>  
        
        <p id="counter">Taskuri: 0</p>

        <button id="btnStergeTot" onclick="stergeTot()" style="display: none;">
            Sterge toate
        </button>
    </div>

    <script>
        function adaugaTask() {
            let taskText = document.getElementById("taskInput").value.trim();

            if (taskText === "") {
                return;
                
            }

            let li = document.createElement("li");
            
            let span = document.createElement("span");
            span.innerText = taskText;
            
            span.onclick = function () {
                span.classList.toggle("completed");
                salveazaTaskuri();
            };

            let btn = document.createElement("button");
            btn.innerText = "X";

            btn.onclick = function () {
                li.remove();
                actualizeazaCounter();
                salveazaTaskuri();
            };

            li.appendChild(span);
            li.appendChild(btn);

            document.getElementById("taskList").appendChild(li);
            document.getElementById("taskInput").value = "";
           
            actualizeazaCounter();
            salveazaTaskuri();
        }

        function apasareEnter(event) {
            if (event.key === "Enter") {
                adaugaTask();
            }
        }

        function actualizeazaCounter() {
            let total = document.getElementById("taskList").children.length;
            document.getElementById("counter").innerText = "Taskuri: " + total;

            let btn = document.getElementById("btnStergeTot");

            if (total > 0) {
                btn.style.display = "inline-block";
            } else {
                btn.style.display = "none";    
            }
        }

        function salveazaTaskuri() {
            let lista = [];
            let items = document.querySelectorAll("#taskList li span");

            items.forEach(item => {
                lista.push({
                    text: item.innerText,
                    completed: item.classList.contains("completed")
                });
            });

            localStorage.setItem("taskuri", JSON.stringify(lista));
        }

        window.onload = function () {
            let data = JSON.parse(localStorage.getItem("taskuri")) || [];

            data.forEach(task => {
                let li = document.createElement("li");

                let span = document.createElement("span");
                span.innerText = task.text;

                if (task.completed) {
                    span.classList.add("completed");       
                }

                span.onclick = function () {
                    span.classList.toggle("completed");
                    salveazaTaskuri();
                };

                let btn = document.createElement("button");
                btn.innerText = "X";
                
                btn.onclick = function () {
                    li.remove();
                    salveazaTaskuri();
                    actualizeazaCounter();
                };

                li.appendChild(span);
                li.appendChild(btn);

                document.getElementById("taskList").appendChild(li);
            });

            actualizeazaCounter();
        };

        function stergeTot() {
            document.getElementById("taskList").innerHTML = "";
            actualizeazaCounter();
            salveazaTaskuri();
        }

    </script>
</body>   
</html>
